<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="stylesheet" href="../public/GeneralStyle.css">
    <link rel="stylesheet" href="../public/FORM.css">
    <link rel="icon" href="../asset/F1Logo.png" sizes="32x32" type="image/png">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="2Q Portfolio">
    <meta name="keywords" content="2Q, Portfolio, Projects, and Web Development">
    <title>F1: Sign Up</title>
</head>
<body>
   
    <form id="form">
        <label>Name</label>
        <input type="text" id="name" maxlength="15" required><br><br>

        <label>Email</label>
        <input type="email" id="email" required><br><br>

        <label>Age</label>
        <input type="number" id="age" min="1" required><br><br>

        <label>Favorite F1 Team</label>
        <select id="team" required>
            <option value="">Choose</option>
            <option>Red Bull Racing</option>
            <option>Mercedes</option>
            <option>Ferrari</option>
            <option>McLaren</option>
            <option>Aston Martin</option>
            <option>Alpine</option>
            <option>Williams</option>
            <option>Haas</option>
            <option>Racing Bulls</option>
            <option>Audi</option>
            <option>Cadillac</option>
        </select><br><br>

        <div class="remember-box">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
        </div>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

    <p id="result"></p>

    <script src="FORM.js"></script>

     <div class="header">
        <a href="../index.html">
            <img src="../asset/F1Logo.png" height="70" alt="F1" title="Formula 1">
        </a>  
        <h1>FullThrottle</h1>
    </div>

    
    <div class="bottomer">
         
        <a href = "../public/References.html">      
            <h1 class = "bottom">References</h1> 
        </a> 
</body>
</html>
